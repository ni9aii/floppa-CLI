name: Mirror Release Assets

# Pushes published release binaries to our own server so app downloads (and the update
# check) keep working even when GitHub is unreachable from clients. Runs only once the
# GitHub release is *published* (not on the draft created by release.yml), then scp's the
# assets under stable filenames into /var/www/floppa-downloads/ on the VPS, where nginx
# serves them at https://<domain>/downloads/ (see cloud-forge: floppa_deploy role + nginx).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to mirror (e.g. v0.5.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: mirror-release
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror to server
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then echo "No tag to mirror"; exit 1; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dl mirror
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dl \
            --pattern '*.apk' \
            --pattern '*.AppImage' \
            --pattern '*.deb' \
            --pattern '*.exe' \
            --pattern '*.msi' \
            --pattern '*.pkg.tar.zst'
          echo "Downloaded:" && ls -lh dl

      - name: Map to stable filenames + build latest.json
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dl

          # Copy the first match for each platform to a version-less stable name.
          copy_one() {
            local glob="$1" dest="$2"
            local matches=( $glob )
            if [ ${#matches[@]} -gt 0 ]; then
              cp "${matches[0]}" "../mirror/$dest"
              echo "  ${matches[0]} -> $dest"
            fi
          }

          echo "Mapping assets:"
          copy_one '*android-arm64.apk'      floppa-vpn-android-arm64.apk
          copy_one '*linux-x86_64.AppImage'  floppa-vpn-linux-x86_64.AppImage
          copy_one '*linux-x86_64.deb'       floppa-vpn-linux-x86_64.deb
          copy_one '*windows-x86_64.exe'     floppa-vpn-windows-x86_64.exe
          copy_one '*windows-x86_64.msi'     floppa-vpn-windows-x86_64.msi
          # Arch package: skip the -debug- variant.
          for f in *-x86_64.pkg.tar.zst; do
            case "$f" in *debug*) continue;; esac
            cp "$f" ../mirror/floppa-vpn-x86_64.pkg.tar.zst
            echo "  $f -> floppa-vpn-x86_64.pkg.tar.zst"
            break
          done

          cd ../mirror
          if [ -z "$(ls -A)" ]; then
            echo "No assets matched — nothing to mirror"; exit 1
          fi

          # latest.json: version + only the files we actually have.
          files='{}'
          add() { [ -f "$2" ] && files="$(echo "$files" | jq --arg k "$1" --arg v "$2" '. + {($k):$v}')"; }
          add android        floppa-vpn-android-arm64.apk
          add linux_appimage floppa-vpn-linux-x86_64.AppImage
          add linux_deb      floppa-vpn-linux-x86_64.deb
          add windows_exe    floppa-vpn-windows-x86_64.exe
          add windows_msi    floppa-vpn-windows-x86_64.msi
          add arch           floppa-vpn-x86_64.pkg.tar.zst
          jq -n \
            --arg version "${{ steps.tag.outputs.version }}" \
            --arg tag "${{ steps.tag.outputs.tag }}" \
            --argjson files "$files" \
            '{version: $version, tag: $tag, files: $files}' > latest.json

          echo "Mirror payload:" && ls -lh && echo "latest.json:" && cat latest.json

      - name: Copy assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MIRROR_SSH_HOST }}
          username: floppadeploy
          key: ${{ secrets.MIRROR_SSH_KEY }}
          source: "mirror/*"
          target: /var/www/floppa-downloads/
          strip_components: 1
          overwrite: true
