name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: floppa-cli (CLI connector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "floppa-cli -> floppa-cli/target"

      - name: Format check
        run: cargo fmt --check --manifest-path floppa-cli/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path floppa-cli/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path floppa-cli/Cargo.toml
