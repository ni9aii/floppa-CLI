name: Release floppa-cli

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & publish (Linux x86_64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev binutils

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build floppa-cli
        run: cargo build --release --manifest-path floppa-cli/Cargo.toml

      - name: Strip binary
        run: strip "target/release/floppa-cli" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: target/release/floppa-cli
