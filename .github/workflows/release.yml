name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0. Required when running manually.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
            shell: bash
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
            shell: bash
          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: macos-x86_64
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: ${{ matrix.shell }}
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --locked -p floppa-cli --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: ${{ matrix.shell }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" || -z "$version" ]]; then
            version="${{ inputs.tag }}"
          fi
          if [[ -z "$version" ]]; then
            echo "Release tag is required. Use a v* tag or provide the tag input for workflow_dispatch." >&2
            exit 1
          fi

          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/floppa-cli.exe" "dist/floppa-cli-${version}-windows-x86_64.exe"
          else
            strip "target/${{ matrix.target }}/release/floppa-cli"
            tar -czf "dist/floppa-cli-${version}-${{ matrix.artifact }}.tar.gz" \
              -C "target/${{ matrix.target }}/release" floppa-cli
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: floppa-cli-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release draft
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare checksums
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" || -z "$version" ]]; then
            version="${{ inputs.tag }}"
          fi
          if [[ -z "$version" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          find dist -maxdepth 2 -type f -print
          (cd dist && find . -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum > "floppa-cli-${version}-SHA256SUMS.txt")

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
